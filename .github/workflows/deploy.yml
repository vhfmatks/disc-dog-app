name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 의존성 설치
        run: npm ci

      # 빌드보다 먼저 돈다. 여기서 실패하면 배포도 멈춘다 — 스키마보다 앞선 프런트가
      # 나가서 앱이 깨지는 것보다, 배포를 안 하는 편이 낫다.
      - name: DB 마이그레이션
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret이 없습니다. 저장소 Settings → Secrets and variables → Actions 에 등록하세요. 형식은 README의 '자동 마이그레이션' 참고 (session mode 5432 필수)."
            exit 1
          fi
          npx prisma migrate deploy

      # config 생성, 문항 검증, React 프로덕션 번들을 한 번에 수행한다.
      - name: 빌드
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
